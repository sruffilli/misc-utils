<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Encoder & Decoder</title>

  <!-- Import Map for Bare Module Resolution -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom": "https://esm.sh/react-dom@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client"
      }
    }
    </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
          colors: {
            brand: { 500: '#3b82f6', 600: '#2563eb' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .bg-grid {
      background-size: 20px 20px;
      background-image:
        linear-gradient(to right, #e2e8f0 1px, transparent 1px),
        linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
    }
  </style>

  <!-- Babel Standalone for In-Browser Transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- CryptoJS for Hashing Algorithms -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-gray-800">
  <div id="root" class="h-full flex flex-col"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    // --- Icons Fallback ---
    const Icon = ({ name, className }) => {
      const icons = {
        LinkIcon: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
        ),
        Check: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <polyline points="20 6 9 17 4 12" />
          </svg>
        ),
        RefreshCw: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
          </svg>
        ),
        Trash2: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        ),
        Code2: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M16 18l6-6-6-6M8 6l-6 6 6 6" />
          </svg>
        ),
        FileText: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" />
          </svg>
        ),
      };
      return icons[name] || null;
    };

    // --- Conversion Utilities ---

    const rot13 = (str) => {
      return str.replace(/[a-zA-Z]/g, function (c) {
        return String.fromCharCode(
          (c <= "Z" ? 90 : 122) >= (c = c.charCodeAt(0) + 13) ? c : c - 26
        );
      });
    };

    const base64Encode = (str) => {
      try { return btoa(unescape(encodeURIComponent(str))); }
      catch (e) { throw new Error("Invalid string for Base64 encoding."); }
    };

    const base64Decode = (str) => {
      try { return decodeURIComponent(escape(atob(str))); }
      catch (e) { throw new Error("Invalid Base64 sequence."); }
    };

    const uriEncode = (str) => encodeURIComponent(str);

    const uriDecode = (str) => {
      try { return decodeURIComponent(str); }
      catch (e) { throw new Error("Invalid URL Encoding."); }
    };

    const uuEncode = (str) => {
      if (!str) return "";
      let out = "begin 644 string.txt\n";
      const toChar = (val) => {
        const c = val + 32;
        return c === 32 ? '`' : String.fromCharCode(c);
      };
      
      for (let i = 0; i < str.length; i += 45) {
        let chunk = str.slice(i, i + 45);
        out += toChar(chunk.length);
        for (let j = 0; j < chunk.length; j += 3) {
          let n = (chunk.charCodeAt(j) << 16) | ((chunk.charCodeAt(j + 1) || 0) << 8) | (chunk.charCodeAt(j + 2) || 0);
          out += toChar((n >> 18) & 63) +
                 toChar((n >> 12) & 63) +
                 toChar((n >> 6) & 63) +
                 toChar(n & 63);
        }
        out += "\n";
      }
      out += "\`\nend\n";
      return out;
    };

    const uuDecode = (str) => {
      let lines = str.split("\n");
      let out = "";
      let valid = false;
      
      const fromChar = (c) => {
        let val = c.charCodeAt(0);
        return (val === 96 ? 0 : val - 32) & 63;
      };

      for (let line of lines) {
        line = line.trimEnd();
        if (line.startsWith("begin") || line.startsWith("end") || line === "\`" || line === "") {
          if (line.startsWith("end")) valid = true;
          continue;
        }
        let lenChar = line.charCodeAt(0);
        let len = (lenChar === 96 ? 0 : lenChar - 32);
        if (len <= 0) break;
        
        for (let i = 1; i < line.length; i += 4) {
          let c1 = fromChar(line[i] || ' ');
          let c2 = fromChar(line[i + 1] || ' ');
          let c3 = fromChar(line[i + 2] || ' ');
          let c4 = fromChar(line[i + 3] || ' ');
          
          let n = (c1 << 18) | (c2 << 12) | (c3 << 6) | c4;
          out += String.fromCharCode((n >> 16) & 255);
          if (--len > 0) out += String.fromCharCode((n >> 8) & 255);
          if (--len > 0) out += String.fromCharCode(n & 255);
          if (--len === 0) break;
        }
      }
      if (!valid && out === "") throw new Error("Invalid UUEncode format.");
      return out;
    };

    // --- Additional Conversions ---
    const hexEncode = (str) => {
      return Array.from(str).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
    };
    const hexDecode = (str) => {
      str = str.replace(/[^0-9A-Fa-f]/g, '');
      if (str.length % 2 !== 0) throw new Error("Invalid Hex string length.");
      let res = '';
      for (let i = 0; i < str.length; i += 2) {
        res += String.fromCharCode(parseInt(str.substring(i, i + 2), 16));
      }
      return res;
    };

    const binEncode = (str) => {
      return Array.from(str).map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
    };
    const binDecode = (str) => {
      str = str.replace(/[^01]/g, '');
      if (str.length % 8 !== 0) throw new Error("Invalid Binary string length.");
      let res = '';
      for (let i = 0; i < str.length; i += 8) {
        res += String.fromCharCode(parseInt(str.substring(i, i + 8), 2));
      }
      return res;
    };

    const BASE32_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    const base32Encode = (str) => {
      let result = "";
      let bits = 0;
      let value = 0;
      for (let i = 0; i < str.length; i++) {
        value = (value << 8) | str.charCodeAt(i);
        bits += 8;
        while (bits >= 5) {
          result += BASE32_ALPHABET[(value >>> (bits - 5)) & 31];
          bits -= 5;
        }
      }
      if (bits > 0) result += BASE32_ALPHABET[(value << (5 - bits)) & 31];
      while (result.length % 8 !== 0) result += "=";
      return result;
    };
    const base32Decode = (str) => {
      str = str.replace(/=+$/, "").toUpperCase();
      let result = "";
      let bits = 0;
      let value = 0;
      for (let i = 0; i < str.length; i++) {
        let val = BASE32_ALPHABET.indexOf(str[i]);
        if (val === -1) throw new Error("Invalid Base32 character.");
        value = (value << 5) | val;
        bits += 5;
        if (bits >= 8) {
          result += String.fromCharCode((value >>> (bits - 8)) & 255);
          bits -= 8;
        }
      }
      return result;
    };

    const BASE58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
    const base58Encode = (str) => {
      if (!str.length) return '';
      const bytes = Array.from(str).map(c => c.charCodeAt(0));
      const digits = [0];
      for (let i = 0; i < bytes.length; i++) {
        for (let j = 0; j < digits.length; j++) digits[j] <<= 8;
        digits[0] += bytes[i];
        let carry = 0;
        for (let j = 0; j < digits.length; ++j) {
          digits[j] += carry;
          carry = (digits[j] / 58) | 0;
          digits[j] %= 58;
        }
        while (carry) {
          digits.push(carry % 58);
          carry = (carry / 58) | 0;
        }
      }
      for (let i = 0; str[i] === '\x00' && i < str.length - 1; i++) digits.push(0);
      return digits.reverse().map(digit => BASE58_ALPHABET[digit]).join('');
    };
    const base58Decode = (str) => {
      if (!str.length) return '';
      const bytes = [0];
      for (let i = 0; i < str.length; i++) {
        const c = str[i];
        if (!(c in Object.fromEntries([...BASE58_ALPHABET].map((c, i) => [c, i])))) throw new Error('Invalid Base58 character');
        for (let j = 0; j < bytes.length; j++) bytes[j] *= 58;
        bytes[0] += BASE58_ALPHABET.indexOf(c);
        let carry = 0;
        for (let j = 0; j < bytes.length; ++j) {
          bytes[j] += carry;
          carry = bytes[j] >> 8;
          bytes[j] &= 0xff;
        }
        while (carry) {
          bytes.push(carry & 0xff);
          carry >>= 8;
        }
      }
      for (let i = 0; str[i] === '1' && i < str.length - 1; i++) bytes.push(0);
      return bytes.reverse().map(byte => String.fromCharCode(byte)).join('');
    };

    const autoDecode = (str) => {
      if (!str.trim()) return { decoded: "", format: "Auto" };

      if (str.includes("begin ") && str.includes("end")) {
        try { return { decoded: uuDecode(str), format: "UUEncode" }; } catch (e) { }
      }

      if (/^[01\s]+$/.test(str.trim()) && str.replace(/[^01]/g, '').length > 0 && str.replace(/[^01]/g, '').length % 8 === 0) {
        try { return { decoded: binDecode(str), format: "Binary" }; } catch (e) { }
      }

      if (/^[0-9a-fA-F]+$/.test(str.trim()) && str.trim().length % 2 === 0) {
        try {
          const decoded = hexDecode(str.trim());
          if (/^[\x20-\x7E\s]*$/.test(decoded) && decoded !== '') return { decoded, format: "Hexadecimal" };
        } catch (e) { }
      }

      const b64Regex = /^(?:[A-Za-z0-9+/]{4})*(?:(?:[A-Za-z0-9+/]{3}=)|(?:[A-Za-z0-9+/]{2}==))?$/;
      if (b64Regex.test(str.trim()) && str.trim().length > 0 && !str.includes(' ')) {
        try {
          const decoded = base64Decode(str);
          if (/^[\x20-\x7E\s\w\W]*$/.test(decoded)) return { decoded, format: "Base64" };
        } catch (e) { }
      }

      const b32Regex = /^[A-Z2-7]+=*$/i;
      if (b32Regex.test(str.trim())) {
        try { return { decoded: base32Decode(str.trim()), format: "Base32" }; } catch (e) { }
      }

      try {
        const decoded = base58Decode(str.trim());
        if (/^[\x20-\x7E\s\w\W]*$/.test(decoded)) return { decoded, format: "Base58" };
      } catch (e) { }

      if (str.includes("%")) {
        try { return { decoded: uriDecode(str), format: "URL Encoding" }; } catch (e) { }
      }

      return { decoded: rot13(str), format: "ROT13" };
    };

    // --- Main App Component ---

    const PUNS = [
      "ROT26: Military-grade plaintext.",
      "Base64: Security through obscurity's lazy cousin.",
      "%20is%20my%20favorite%20space%20bar.",
      "I know Base64, but what about the other 63?",
      "UUEncode: Tell me you're from the 90s without telling me.",
      "Encoding: giving your strings a fake ID.",
      "My safe word is SGVscCE=",
      "Caesar didn't die for ROT13 to be used like this.",
      "URL encoding: %57%68%79.",
      "If you think Base64 is encryption, we need to talk.",
      "SGVsbG8gV29ybGQ= (trust me bro)",
      "ROT13 twice: innovation",
      "Making gibberish slightly more professional",
      "It's not obfuscation, it's *vibes*"
    ];

    function App() {
      const initParams = new URLSearchParams(window.location.search);

      const [pun] = useState(() => PUNS[Math.floor(Math.random() * PUNS.length)]);
      const [input, setInput] = useState(initParams.get('text') || '');
      const [output, setOutput] = useState('');
      const [mode, setMode] = useState(initParams.get('mode') || 'encode'); // 'encode' | 'decode' | 'hash'
      const [encoding, setEncoding] = useState(initParams.get('algo') || 'Base64');
      const [error, setError] = useState('');
      const [copiedLink, setCopiedLink] = useState(false);
      const [copiedOutput, setCopiedOutput] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      const [detectedFormat, setDetectedFormat] = useState('');

      const handleUpdate = () => {
        if (!input) {
          setOutput('');
          setError('');
          setDetectedFormat('');
          return;
        }

        try {
          setError('');
          let res = '';
          setDetectedFormat('');
          if (mode === 'encode') {
            if (encoding === 'Base64') res = base64Encode(input);
            else if (encoding === 'Base32') res = base32Encode(input);
            else if (encoding === 'Base58') res = base58Encode(input);
            else if (encoding === 'Hexadecimal') res = hexEncode(input);
            else if (encoding === 'Binary') res = binEncode(input);
            else if (encoding === 'UUEncode') res = uuEncode(input);
            else if (encoding === 'ROT13') res = rot13(input);
            else if (encoding === 'ROT26') res = input; // ROT26 is just the input
            else if (encoding === 'URL') res = uriEncode(input);
          } else if (mode === 'decode') {
            if (encoding === 'Auto') {
              const auto = autoDecode(input);
              res = auto.decoded;
              setDetectedFormat(auto.format);
            }
            else if (encoding === 'Base64') res = base64Decode(input);
            else if (encoding === 'Base32') res = base32Decode(input);
            else if (encoding === 'Base58') res = base58Decode(input);
            else if (encoding === 'Hexadecimal') res = hexDecode(input);
            else if (encoding === 'Binary') res = binDecode(input);
            else if (encoding === 'UUEncode') res = uuDecode(input);
            else if (encoding === 'ROT13') res = rot13(input);
            else if (encoding === 'ROT26') res = input; // ROT26 is just the input
            else if (encoding === 'URL') res = uriDecode(input);
          } else if (mode === 'hash') {
            if (encoding === 'MD5') res = CryptoJS.MD5(input).toString(CryptoJS.enc.Hex);
            else if (encoding === 'SHA-1') res = CryptoJS.SHA1(input).toString(CryptoJS.enc.Hex);
            else if (encoding === 'SHA-256') res = CryptoJS.SHA256(input).toString(CryptoJS.enc.Hex);
            else if (encoding === 'SHA-512') res = CryptoJS.SHA512(input).toString(CryptoJS.enc.Hex);
          }
          setOutput(res);
        } catch (e) {
          setError(e.message);
          setOutput('');
        }
      };

      // Re-render when input or modes change
      useEffect(() => {
        handleUpdate();
      }, [input, mode, encoding]);

      useEffect(() => {
        document.title = `StringCodec - ${pun}`;
      }, [pun]);

      useEffect(() => {
        if (encoding === 'ROT26') {
          setToastMessage("I don't know what you expected...");
          const timer = setTimeout(() => setToastMessage(''), 3000);
          return () => clearTimeout(timer);
        }
      }, [encoding]);

      const copyLink = () => {
        try {
          const urlObj = new URL(window.location.href);
          urlObj.searchParams.set('mode', mode);
          urlObj.searchParams.set('algo', encoding);
          if (input) urlObj.searchParams.set('text', input);
          else urlObj.searchParams.delete('text');
          
          const newUrl = urlObj.toString();

          const textArea = document.createElement("textarea");
          textArea.value = newUrl;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);

          try { window.history.replaceState({}, '', newUrl); } catch(e) { }

          setCopiedLink(true);
          setTimeout(() => setCopiedLink(false), 2000);
        } catch (err) {
          console.warn("Failed to copy link:", err);
        }
      };

      const copyOutput = () => {
        if (output && !error) {
          navigator.clipboard.writeText(output);
          setCopiedOutput(true);
          setTimeout(() => setCopiedOutput(false), 2000);
        }
      };

      const handleClear = () => {
        setInput('');
      };

      const handleSwitchMode = () => {
        if (mode === 'hash') return;
        const newMode = mode === 'encode' ? 'decode' : 'encode';
        setMode(newMode);
        if (newMode === 'encode' && encoding === 'Auto') {
          setEncoding('Base64');
        }
        // Optional: Swap input and output automatically
        if (output && !error) {
          setInput(output);
        }
      };

      return (
        <div className="h-screen flex flex-col font-sans text-gray-800 bg-gray-50">

          {/* Navbar */}
          <nav className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0 z-20">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-sm">S</div>
              <div className="flex flex-col justify-center max-w-[200px] sm:max-w-md">
                <span className="font-bold tracking-tight text-sm leading-tight">String<span className="text-blue-600">Codec</span></span>
                <span className="text-[10px] text-gray-500 font-medium truncate" title={pun}>{pun}</span>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <button
                onClick={copyLink}
                className="text-xs font-medium text-gray-500 bg-gray-100 hover:bg-gray-200 px-2.5 py-1.5 rounded border border-gray-200 flex items-center gap-1.5 transition-colors"
              >
                {copiedLink ? <Icon name="Check" className="w-4 h-4 text-emerald-600" /> : <Icon name="LinkIcon" className="w-4 h-4" />}
                {copiedLink ? <span className="text-emerald-600">Copied!</span> : <span>Share Link</span>}
              </button>
              <a href="https://github.com/sruffilli/sruffilli.github.io/blob/main/webutils/encoder-decoder.html" target="_blank" className="text-gray-400 hover:text-gray-900 transition-colors" title="GitHub Repository">
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.05-.015-2.055-3.33 0-4.035-1.44-4.29-1.875-.15-.36-.75-1.44-1.29-1.725-.435-.24-1.065-.825-.015-.84 1.14-.015 1.95 1.05 2.22 1.485 1.05 1.785 2.76 1.275 3.45.975.105-.75.405-1.275.735-1.575-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.225 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405 1.02 0 2.04.135 3 .405 2.28-1.545 3.285-1.23 3.285-1.23.66 1.695.24 2.925.12 3.225.765.84 1.23 1.92 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.42.36.78 1.095.78 2.205 0 1.59-.015 2.865-.015 3.255 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" /></svg>
              </a>
            </div>
          </nav>

          <div className="flex flex-1 overflow-hidden">

            {/* Sidebar */}
            <aside className="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 z-10 shadow-sm relative">
              <div className="flex-1 overflow-y-auto p-5 space-y-6">

                {/* Mode Selection */}
                <div className="space-y-3">
                  <div className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                    <Icon name="RefreshCw" className="w-4 h-4" /> Mode
                  </div>
                  <div className="flex p-1 bg-gray-100 rounded-lg">
                    <button
                      className={`flex-1 flex items-center justify-center gap-1 px-2 py-1.5 text-[11px] font-bold rounded-md transition-all ${mode === 'encode' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-900'}`}
                      onClick={() => { setMode('encode'); if (['MD5', 'SHA-1', 'SHA-256', 'SHA-512'].includes(encoding) || encoding === 'Auto') setEncoding('Base64'); }}
                    >
                      Encode
                    </button>
                    <button
                      className={`flex-1 flex items-center justify-center gap-1 px-2 py-1.5 text-[11px] font-bold rounded-md transition-all ${mode === 'decode' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-900'}`}
                      onClick={() => { setMode('decode'); if (['MD5', 'SHA-1', 'SHA-256', 'SHA-512'].includes(encoding)) setEncoding('Auto'); }}
                    >
                      Decode
                    </button>
                    <button
                      className={`flex-1 flex items-center justify-center gap-1 px-2 py-1.5 text-[11px] font-bold rounded-md transition-all ${mode === 'hash' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-900'}`}
                      onClick={() => { setMode('hash'); if (!['MD5', 'SHA-1', 'SHA-256', 'SHA-512'].includes(encoding)) setEncoding('SHA-256'); }}
                    >
                      Hash
                    </button>
                  </div>
                </div>

                {/* Format Selection */}
                <div className="space-y-3">
                  <div className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                    <Icon name="Code2" className="w-4 h-4" /> Format
                  </div>
                  <div className="relative">
                    <select
                      value={encoding}
                      onChange={(e) => setEncoding(e.target.value)}
                      className="w-full bg-white border border-gray-300 text-gray-900 font-semibold text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block px-3 py-2.5 outline-none appearance-none cursor-pointer hover:bg-gray-50"
                    >
                      {mode === 'decode' && <option value="Auto">Auto-detect ✨</option>}
                      {mode !== 'hash' && (
                        <>
                          <option value="Base64">Base64</option>
                          <option value="Base32">Base32</option>
                          <option value="Base58">Base58</option>
                          <option value="Binary">Binary</option>
                          <option value="Hexadecimal">Hexadecimal</option>
                          <option value="ROT13">ROT13</option>
                          <option value="ROT26">ROT26</option>
                          <option value="URL">URL Encoding</option>
                          <option value="UUEncode">UUEncode</option>
                        </>
                      )}
                      {mode === 'hash' && (
                        <>
                          <option value="MD5">MD5</option>
                          <option value="SHA-1">SHA-1</option>
                          <option value="SHA-256">SHA-256</option>
                          <option value="SHA-512">SHA-512</option>
                        </>
                      )}
                    </select>
                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                      <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                    </div>
                  </div>
                </div>

                <hr className="border-gray-200" />

                {/* Actions */}
                <div className="space-y-3">
                  <div className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                    <Icon name="FileText" className="w-4 h-4" /> Actions
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <button
                      type="button"
                      onClick={handleSwitchMode}
                      disabled={mode === 'hash'}
                      className={`px-3 py-2 font-medium rounded-lg text-sm shadow-sm transition-all flex items-center justify-center gap-1.5 ${mode === 'hash' ? 'bg-gray-100 text-gray-400 cursor-not-allowed border border-gray-100' : 'bg-blue-600 hover:bg-blue-700 text-white border border-transparent'}`}
                    >
                      <Icon name="RefreshCw" className="w-4 h-4" />
                      Swap
                    </button>
                    <button
                      type="button"
                      onClick={handleClear}
                      className="px-3 py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium rounded-lg text-sm border border-gray-200 transition-all flex items-center justify-center gap-1.5"
                    >
                      <Icon name="Trash2" className="w-4 h-4 text-gray-400" />
                      Clear
                    </button>
                  </div>
                </div>

                {error && (
                  <div className="p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2 text-red-600 text-xs text-left">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mt-0.5 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>
                    <span className="font-semibold">{error}</span>
                  </div>
                )}

              </div>
            </aside>

            {/* Main Content */}
            <main className="flex-1 bg-grid overflow-y-auto overflow-x-hidden flex flex-col relative p-6">

              <div className="flex flex-col h-full gap-5 mx-auto w-full max-w-4xl max-h-[900px]">
                {/* Input Panel */}
                <div className="flex-1 flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm text-gray-800 focus-within:ring-2 ring-blue-500 ring-offset-2 ring-offset-gray-50 transition-shadow">
                  <div className="bg-gray-50 px-4 py-3 border-b border-gray-200 rounded-t-xl shrink-0 flex items-center justify-between">
                    <div className="text-xs font-bold tracking-wider uppercase text-gray-500 flex items-center gap-2">
                      Input Data
                    </div>
                  </div>
                  <textarea
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    placeholder={`Paste or type string to ${mode}...`}
                    className="w-full flex-1 p-4 bg-transparent resize-none outline-none font-mono text-sm leading-relaxed"
                    spellCheck="false"
                  ></textarea>
                </div>

                {/* Output Panel */}
                <div className="flex-1 flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden relative">
                  <div className="bg-gray-50 px-4 py-3 border-b border-gray-200 rounded-t-xl shrink-0 flex justify-between items-center">
                    <div className="text-xs font-bold tracking-wider uppercase text-gray-500 flex items-center gap-2">
                      {mode === 'encode' ? 'Encoded Output' : mode === 'decode' ? (encoding === 'Auto' && detectedFormat && detectedFormat !== 'Auto' ? `Decoded Output (${detectedFormat})` : 'Decoded Output') : 'Hashed Output'}
                    </div>
                    {output && !error && (
                      <button
                        onClick={copyOutput}
                        className="text-[11px] font-bold bg-white text-blue-600 hover:text-blue-800 px-2 py-1 rounded shadow-sm border border-gray-200 flex items-center gap-1 transition-colors"
                      >
                        {copiedOutput ? (
                          <><Icon name="Check" className="w-3 h-3 text-emerald-500" /> Copied</>
                        ) : (
                          <><Icon name="FileText" className="w-3 h-3" /> Copy</>
                        )}
                      </button>
                    )}
                  </div>
                  <div className="w-full flex-1 p-4 overflow-auto font-mono text-sm leading-relaxed select-text">
                    {error ? (
                      <div className="text-red-500 text-center mt-10 italic">Waiting for valid input...</div>
                    ) : !input ? (
                      <div className="text-gray-400 text-center mt-10 italic font-sans">Result will appear here</div>
                    ) : (
                      <span className="text-gray-900 break-all whitespace-pre-wrap">{output}</span>
                    )}
                  </div>
                </div>
              </div>

            </main>
          </div>

          {/* Toast Message */}
          {toastMessage && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm font-medium z-50 flex items-center gap-2">
              <span className="text-xl">🤷‍♂️</span>
              <span>{toastMessage}</span>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
