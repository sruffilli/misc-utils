<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Subnet Calculator</title>
    
    <!-- Import Map for Bare Module Resolution -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
                    colors: { 
                        brand: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid {
            background-size: 20px 20px;
            background-image:
                linear-gradient(to right, #f1f5f9 1px, transparent 1px),
                linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
        }
    </style>

    <!-- Babel Standalone for In-Browser Transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-gray-800">
    <div id="root" class="h-full flex flex-col"></div>

    <!-- The React App -->
    <script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useCallback } from 'react';

// --- Icons Fallback (Inline SVGs to prevent import/sandbox issues) ---
const Icon = ({ name, className }) => {
  const icons = {
    Network: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="16" y="16" width="6" height="6" rx="1" /><rect x="2" y="16" width="6" height="6" rx="1" /><rect x="9" y="2" width="6" height="6" rx="1" />
        <path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3" /><path d="M12 12V8" />
      </svg>
    ),
    Split: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M16 3h5v5" /><path d="M8 3H3v5" /><path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3" /><path d="m15 9 6-6" />
      </svg>
    ),
    Merge: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m8 6 4-4 4 4" /><path d="M12 2v10.3a4 4 0 0 1-1.172 2.872L3 22" /><path d="m20 22-5-5" />
      </svg>
    ),
    RotateCcw: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
      </svg>
    ),
    Settings2: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M20 7h-9" /><path d="M14 17H5" /><circle cx="17" cy="7" r="3" /><circle cx="7" cy="17" r="3" />
      </svg>
    ),
    LinkIcon: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
      </svg>
    ),
    Check: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="20 6 9 17 4 12" />
      </svg>
    ),
    ChevronRight: (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m9 18 6-6-6-6" />
      </svg>
    )
  };
  return icons[name] || null;
};

// --- IP Math Utilities ---

const ip2long = (ip) => {
  return ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;
};

const long2ip = (long) => {
  return [
    (long >>> 24) & 255,
    (long >>> 16) & 255,
    (long >>> 8) & 255,
    long & 255
  ].join('.');
};

const getSubnetDetails = (ipInt, cidr) => {
  // Handle JS bitwise quirk for shift by 32
  const mask = cidr === 0 ? 0 : (0xFFFFFFFF << (32 - cidr)) >>> 0;
  const network = (ipInt & mask) >>> 0;
  const broadcast = cidr === 32 ? network : (network | ~mask) >>> 0;

  let useableStart = network + 1;
  let useableEnd = broadcast - 1;
  let numHosts = 0;

  if (cidr === 32) {
    useableStart = network;
    useableEnd = network;
    numHosts = 1;
  } else if (cidr === 31) {
    useableStart = network;
    useableEnd = broadcast;
    numHosts = 2;
  } else {
    // Math.pow is safer than bitwise for 2^32
    numHosts = Math.pow(2, 32 - cidr) - 2;
  }

  return {
    networkInt: network,
    broadcastInt: broadcast,
    networkStr: long2ip(network),
    netmaskStr: long2ip(mask),
    broadcastStr: long2ip(broadcast),
    rangeStr: `${long2ip(network)} - ${long2ip(broadcast)}`,
    useableStr: `${long2ip(useableStart)} - ${long2ip(useableEnd)}`,
    hosts: numHosts
  };
};


// --- UI Components ---

const Toggle = ({ checked, onChange, label }) => (
  <label className="flex items-center space-x-2 cursor-pointer group">
    <div className="relative flex items-center">
      <input
        type="checkbox"
        className="sr-only"
        checked={checked}
        onChange={(e) => onChange(e.target.checked)}
      />
      <div className={`w-8 h-4 rounded-full transition-colors ${checked ? 'bg-blue-600' : 'bg-gray-200'}`}></div>
      <div className={`absolute left-0.5 top-0.5 w-3 h-3 rounded-full bg-white transition-transform ${checked ? 'translate-x-4' : 'translate-x-0'}`}></div>
    </div>
    <span className="text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">{label}</span>
  </label>
);

// --- Recursive Subnet Row Component ---

const SubnetNode = ({ ip, cidr, splitNodes, visibleCols, onDivide, onJoin, gridTemplate }) => {
  const id = `${long2ip(ip)}/${cidr}`;
  const isSplit = splitNodes.has(id);
  const details = useMemo(() => getSubnetDetails(ip, cidr), [ip, cidr]);

  if (isSplit) {
    const leftIp = ip;
    const rightIp = ip + Math.pow(2, 32 - (cidr + 1));

    return (
      <div className="flex w-full group/join">
        <div className="flex-1 flex flex-col min-w-0">
          <SubnetNode
            ip={leftIp} cidr={cidr + 1}
            splitNodes={splitNodes} visibleCols={visibleCols}
            onDivide={onDivide} onJoin={onJoin} gridTemplate={gridTemplate}
          />
          <SubnetNode
            ip={rightIp} cidr={cidr + 1}
            splitNodes={splitNodes} visibleCols={visibleCols}
            onDivide={onDivide} onJoin={onJoin} gridTemplate={gridTemplate}
          />
        </div>
        {visibleCols.join && (
          <div
            onClick={() => onJoin(id)}
            className="w-12 border-b border-l border-gray-200 bg-gray-50 hover:bg-blue-50 flex flex-col items-center justify-center cursor-pointer transition-all duration-200 group-hover/join:border-blue-500/50 relative overflow-hidden"
            title={`Join subnets back to /${cidr}`}
          >
            <Icon name="Merge" className="w-4 h-4 text-gray-400 group-hover/join:text-blue-500 mb-2 rotate-90" />
            <span className="text-xs font-mono font-bold text-gray-400 group-hover/join:text-blue-600 -rotate-90 whitespace-nowrap tracking-widest">
              /{cidr}
            </span>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="flex w-full border-b border-gray-200 hover:bg-gray-50 transition-colors">
      <div
        className="grid flex-1 items-stretch text-sm font-mono text-gray-700"
        style={{ gridTemplateColumns: gridTemplate }}
      >
        {visibleCols.subnet && (
          <div className="p-3 truncate flex items-center border-r border-gray-200">
            <span className="text-gray-900 font-semibold">{details.networkStr}</span>
            <span className="text-blue-600 ml-1">/{cidr}</span>
          </div>
        )}
        {visibleCols.netmask && (
          <div className="p-3 truncate flex items-center border-r border-gray-200 text-gray-500">
            {details.netmaskStr}
          </div>
        )}
        {visibleCols.range && (
          <div className="p-3 truncate flex items-center border-r border-gray-200 text-emerald-600">
            {details.rangeStr}
          </div>
        )}
        {visibleCols.useable && (
          <div className="p-3 truncate flex items-center border-r border-gray-200 text-blue-600">
            {details.useableStr}
          </div>
        )}
        {visibleCols.hosts && (
          <div className="p-3 truncate flex items-center border-r border-gray-200 justify-end font-semibold text-gray-800">
            {details.hosts.toLocaleString()}
          </div>
        )}
        {visibleCols.divide && (
          <div className="p-2 flex items-center justify-center">
            {cidr < 32 ? (
              <button
                onClick={() => onDivide(id)}
                className="flex items-center justify-center px-2 py-1.5 w-full bg-gray-100 hover:bg-blue-600 text-gray-700 hover:text-white rounded border border-gray-200 transition-all group"
                title="Split into two smaller subnets"
              >
                <Icon name="Split" className="w-4 h-4 sm:mr-1.5 group-hover:scale-110 transition-transform" />
                <span className="hidden sm:inline text-xs font-bold uppercase tracking-wider">Divide</span>
              </button>
            ) : (
              <span className="text-xs text-gray-400 uppercase font-bold">Max</span>
            )}
          </div>
        )}
      </div>
    </div>
  );
};


// --- Main Application ---

export default function App() {
  // Form State
  const [networkInput, setNetworkInput] = useState('169.254.128.120');
  const [cidrInput, setCidrInput] = useState('29');
  const [error, setError] = useState('');

  // App State
  const [baseIp, setBaseIp] = useState(ip2long('169.254.128.120'));
  const [baseCidr, setBaseCidr] = useState(29);
  const [splitNodes, setSplitNodes] = useState(new Set());
  const [copiedLink, setCopiedLink] = useState(false);

  // Column Visibility State
  const [visibleCols, setVisibleCols] = useState({
    subnet: true,
    netmask: false,
    range: true,
    useable: true,
    hosts: true,
    divide: true,
    join: true,
  });

  // Calculate Grid Template based on visible columns
  const gridTemplate = useMemo(() => {
    const cols = [];
    if (visibleCols.subnet) cols.push('minmax(140px, 2fr)');
    if (visibleCols.netmask) cols.push('minmax(120px, 1.5fr)');
    if (visibleCols.range) cols.push('minmax(220px, 3fr)');
    if (visibleCols.useable) cols.push('minmax(220px, 3fr)');
    if (visibleCols.hosts) cols.push('minmax(80px, 1fr)');
    if (visibleCols.divide) cols.push('minmax(90px, 1fr)');
    return cols.join(' ');
  }, [visibleCols]);

  // Load from URL on mount
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const ipParam = params.get('ip');
      const cidrParam = params.get('cidr');
      const splitParam = params.get('split');

      if (ipParam && cidrParam) {
        setNetworkInput(ipParam);
        setCidrInput(cidrParam);
        setBaseIp(ip2long(ipParam));
        setBaseCidr(parseInt(cidrParam, 10));
      }
      if (splitParam) {
        setSplitNodes(new Set(splitParam.split(',').filter(Boolean)));
      }
    } catch (e) {
      console.warn('Failed to parse URL parameters:', e);
    }
  }, []);

  // Sync to URL when state changes
  useEffect(() => {
    const params = new URLSearchParams();
    params.set('ip', long2ip(baseIp));
    params.set('cidr', baseCidr.toString());
    const splits = Array.from(splitNodes);
    if (splits.length > 0) {
      params.set('split', splits.join(','));
    }
    const newUrl = `${window.location.pathname}?${params.toString()}`;

    // Safely update URL history (avoids sandboxed iframe crashes)
    try {
      window.history.replaceState(null, '', newUrl);
    } catch (e) {
      console.debug('History update blocked by sandbox environment.');
    }
  }, [baseIp, baseCidr, splitNodes]);

  const handleUpdate = () => {
    setError(''); // Clear any previous errors

    // Trim to prevent trailing spaces from breaking the regex
    const trimmedIp = networkInput.trim();
    const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;

    if (!ipRegex.test(trimmedIp)) {
      setError("Please enter a valid IPv4 address (e.g. 192.168.1.0).");
      return;
    }

    const cidr = parseInt(cidrInput, 10);
    if (isNaN(cidr) || cidr < 0 || cidr > 32) {
      setError("CIDR must be between 0 and 32.");
      return;
    }

    // Auto-correct IP to network address
    const ipInt = ip2long(trimmedIp);
    const { networkInt } = getSubnetDetails(ipInt, cidr);

    setBaseIp(networkInt);
    setNetworkInput(long2ip(networkInt)); // Update input to show network address
    setBaseCidr(cidr);
    setSplitNodes(new Set()); // Reset splits on new network
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleUpdate();
    }
  };

  const handleReset = () => {
    setSplitNodes(new Set());
  };

  const handleDivide = useCallback((id) => {
    setSplitNodes(prev => {
      const next = new Set(prev);
      next.add(id);
      return next;
    });
  }, []);

  const handleJoin = useCallback((id) => {
    setSplitNodes(prev => {
      const next = new Set(prev);
      // Remove the split at this node
      next.delete(id);
      // Clean up any nested splits under this node
      const [ipStr, cidrStr] = id.split('/');
      const ipInt = ip2long(ipStr);
      const cidr = parseInt(cidrStr, 10);
      const { networkInt, broadcastInt } = getSubnetDetails(ipInt, cidr);

      for (const splitId of next) {
        const [sIpStr, sCidrStr] = splitId.split('/');
        const sIpInt = ip2long(sIpStr);
        const sCidr = parseInt(sCidrStr, 10);

        // A node is a child if its IP falls within the parent range 
        // AND its CIDR prefix is strictly greater than the parent's CIDR
        if (sIpInt >= networkInt && sIpInt <= broadcastInt && sCidr > cidr) {
          next.delete(splitId);
        }
      }
      return next;
    });
  }, []);

  const toggleCol = (key, value) => {
    setVisibleCols(prev => ({ ...prev, [key]: value }));
  };

  const copyLink = () => {
    try {
      // Using execCommand as clipboard API might be blocked in sandboxed iframes
      const textArea = document.createElement("textarea");
      textArea.value = window.location.href;
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand("copy");
      document.body.removeChild(textArea);

      setCopiedLink(true);
      setTimeout(() => setCopiedLink(false), 2000);
    } catch (err) {
      console.warn("Failed to copy link:", err);
    }
  };

  return (
    <div className="h-screen flex flex-col font-sans text-gray-800 bg-gray-50">
      
      {/* Navbar */}
      <nav className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0 z-20">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-sm">C</div>
          <div className="flex flex-col justify-center">
            <span className="font-bold tracking-tight text-sm leading-tight">Subnet<span className="text-blue-600">Visualizer</span></span>
            <span className="text-[10px] text-gray-500 font-medium truncate">Visual IPv4 Subnet Calculator</span>
          </div>
        </div>
        <div className="flex items-center gap-4">
          <button
            onClick={copyLink}
            className="text-xs font-medium text-gray-500 bg-gray-100 hover:bg-gray-200 px-2.5 py-1.5 rounded border border-gray-200 flex items-center gap-1.5 transition-colors"
          >
            {copiedLink ? <Icon name="Check" className="w-4 h-4 text-emerald-600" /> : <Icon name="LinkIcon" className="w-4 h-4" />}
            {copiedLink ? <span className="text-emerald-600">Copied!</span> : <span>Share Link</span>}
          </button>
        </div>
      </nav>

      <div className="flex flex-1 overflow-hidden">
        
        {/* Sidebar */}
        <aside className="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 z-10 shadow-sm">
          <div className="flex-1 overflow-y-auto p-5 space-y-6">
            
            {/* Network Address Input */}
            <div className="space-y-2">
              <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider">
                Network Address
              </label>
              <input
                type="text"
                value={networkInput}
                onChange={(e) => setNetworkInput(e.target.value)}
                onKeyDown={handleKeyDown}
                className="w-full bg-white border border-gray-300 text-gray-900 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent font-mono transition-all"
                placeholder="192.168.1.0"
              />
            </div>

            {/* Mask Bits Input */}
            <div className="space-y-2">
              <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider">
                Mask Bits
              </label>
              <div className="relative flex items-center">
                <span className="absolute left-3 text-gray-500 font-mono text-sm">/</span>
                <input
                  type="number"
                  min="0"
                  max="32"
                  value={cidrInput}
                  onChange={(e) => setCidrInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  className="w-full bg-white border border-gray-300 text-gray-900 rounded-lg pl-7 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent font-mono transition-all"
                />
              </div>
            </div>

            {/* Actions */}
            <div className="grid grid-cols-2 gap-2">
              <button
                type="button"
                onClick={handleUpdate}
                className="px-3 py-2 bg-blue-600 hover:bg-blue-600 text-white font-medium rounded-lg text-sm shadow-sm transition-all flex items-center justify-center gap-1.5"
              >
                <Icon name="RotateCcw" className="w-4 h-4" />
                Update
              </button>
              <button
                type="button"
                onClick={handleReset}
                className="px-3 py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium rounded-lg text-sm border border-gray-200 transition-all"
              >
                Reset
              </button>
            </div>

            {error && (
              <div className="p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-600 text-xs">
                <span className="font-semibold">Error:</span> {error}
              </div>
            )}

            <hr className="border-gray-200" />

            {/* Columns Toggles */}
            <div className="space-y-4">
              <div className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                <Icon name="Settings2" className="w-4 h-4" /> Columns
              </div>
              <div className="space-y-3">
                {Object.entries({
                  subnet: 'Subnet Address',
                  netmask: 'Netmask',
                  range: 'Range',
                  useable: 'Useable IPs',
                  hosts: 'Hosts',
                  divide: 'Divide',
                  join: 'Join'
                }).map(([key, label]) => (
                  <Toggle
                    key={key}
                    label={label}
                    checked={visibleCols[key]}
                    onChange={(val) => toggleCol(key, val)}
                  />
                ))}
              </div>
            </div>

          </div>

          <div className="p-5 border-t border-gray-200 bg-gray-50 text-[10px] text-gray-500 flex items-center gap-1">
            <Icon name="ChevronRight" className="w-3.5 h-3.5 text-blue-500" />
            Click divide to split subnets. Join to merge back.
          </div>
        </aside>

        {/* Main Content */}
        <main className="flex-1 bg-grid overflow-hidden flex flex-col relative">
          
          <div className="flex-1 overflow-y-auto p-6 flex flex-col">
            
            <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col flex-1">
              
              {/* Table Header */}
              <div className="flex w-full bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
                <div
                  className="grid flex-1 items-stretch text-[11px] font-bold text-gray-500 uppercase tracking-wider"
                  style={{ gridTemplateColumns: gridTemplate }}
                >
                  {visibleCols.subnet && <div className="p-3">Subnet Address</div>}
                  {visibleCols.netmask && <div className="p-3">Netmask</div>}
                  {visibleCols.range && <div className="p-3">Range of Addresses</div>}
                  {visibleCols.useable && <div className="p-3">Useable IPs</div>}
                  {visibleCols.hosts && <div className="p-3 text-right">Hosts</div>}
                  {visibleCols.divide && <div className="p-3 text-center">Divide</div>}
                </div>
                {visibleCols.join && (
                  <div className="w-12 p-3 border-l border-gray-200 bg-gray-50 flex justify-center text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                    Join
                  </div>
                )}
              </div>

              {/* Recursive Tree Body */}
              <div className="overflow-x-auto flex-1">
                <div className="min-w-[800px] flex flex-col h-full">
                  <SubnetNode
                    ip={baseIp}
                    cidr={baseCidr}
                    splitNodes={splitNodes}
                    visibleCols={visibleCols}
                    onDivide={handleDivide}
                    onJoin={handleJoin}
                    gridTemplate={gridTemplate}
                  />
                </div>
              </div>

            </div>

          </div>

        </main>

      </div>
    </div>
  );
}
// --- Render Logic ---
import { createRoot } from 'react-dom/client';
const container = document.getElementById('root');
const root = createRoot(container);
root.render(<App />);

    </script>
</body>
</html>
