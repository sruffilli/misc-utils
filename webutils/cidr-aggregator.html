<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIDR Aggregator</title>

  <!-- Import Map for Bare Module Resolution -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom": "https://esm.sh/react-dom@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client"
      }
    }
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
          colors: {
            brand: { 500: '#3b82f6', 600: '#2563eb' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .bg-grid {
      background-size: 20px 20px;
      background-image:
        linear-gradient(to right, #f1f5f9 1px, transparent 1px),
        linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
    }
  </style>

  <!-- Babel Standalone for In-Browser Transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-gray-800">
  <div id="root" class="h-full flex flex-col"></div>

  <!-- The React App -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useCallback } from 'react';

    // --- Icons ---
    const Icon = ({ name, className }) => {
      const icons = {
        Clipboard: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
          </svg>
        ),
        Check: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <polyline points="20 6 9 17 4 12" />
          </svg>
        ),
        LinkIcon: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
        ),
        Home: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        ),
        Zap: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        ),
        Trash: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
          </svg>
        ),
        Activity: (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2" />
          </svg>
        )
      };
      return icons[name] || null;
    };

    // --- Math Utilities ---

    const ip2long = (ip) => {
      return ip.split('.').reduce((acc, octet) => (acc * 256) + parseInt(octet, 10), 0);
    };

    const long2ip = (long) => {
      return [
        Math.floor(long / 16777216) % 256,
        Math.floor(long / 65536) % 256,
        Math.floor(long / 256) % 256,
        long % 256
      ].join('.');
    };

    const parseCIDRs = (inputText) => {
      const tokens = inputText.split(/[\s,]+/);
      const ranges = [];
      const errors = [];

      for (let token of tokens) {
        if (!token) continue;

        let [ipStr, cidrStr] = token.split('/');
        let cidr = cidrStr !== undefined ? parseInt(cidrStr, 10) : 32;

        if (isNaN(cidr) || cidr < 0 || cidr > 32) {
          errors.push(`Invalid mask: ${token}`);
          continue;
        }

        const ipParts = ipStr.split('.');
        if (ipParts.length !== 4 || ipParts.some(p => p === '' || isNaN(parseInt(p, 10)) || parseInt(p, 10) < 0 || parseInt(p, 10) > 255)) {
          errors.push(`Invalid IP: ${token}`);
          continue;
        }

        const start = ip2long(ipStr);
        const size = Math.pow(2, 32 - cidr);
        const network = start - (start % size);
        const broadcast = network + size - 1;
        ranges.push({ start: network, end: broadcast, original: token });
      }
      return { ranges, errors };
    };

    const aggregateCIDRs = (ranges) => {
      if (!ranges || ranges.length === 0) return [];

      // Sort by start address
      const sorted = [...ranges].sort((a, b) => a.start - b.start || a.end - b.end);

      // Merge overlapping and adjacent ranges
      const merged = [{ start: sorted[0].start, end: sorted[0].end }];
      for (let i = 1; i < sorted.length; i++) {
        const last = merged[merged.length - 1];
        const current = sorted[i];

        if (current.start <= last.end + 1) { // + 1 handles adjacent blocks
          last.end = Math.max(last.end, current.end);
        } else {
          merged.push({ start: current.start, end: current.end });
        }
      }

      // Convert back to CIDRs
      const results = [];
      for (let range of merged) {
        let start = range.start;
        const end = range.end;

        while (start <= end) {
          let shift = 0;
          while (shift < 32 &&
            (start % Math.pow(2, shift + 1)) === 0 &&
            (start + Math.pow(2, shift + 1) - 1) <= end) {
            shift++;
          }

          const cidr = 32 - shift;
          results.push(`${long2ip(start)}/${cidr}`);
          start += Math.pow(2, shift);
        }
      }
      return results;
    };


    const PUNS = [
      "CIDR? I hardly know her!",
      "Summarizing routes before they get too long",
      "Aggregating IPs since 1993",
      "Making your routing tables great again",
      "I like big blocks and I cannot lie",
      "Why have many small subnets when one big subnet do trick?"
    ];

    export default function App() {
      const [pun] = useState(() => PUNS[Math.floor(Math.random() * PUNS.length)]);

      useEffect(() => {
        document.title = `CIDR Aggregator - ${pun}`;
      }, [pun]);

      const [input, setInput] = useState(() => {
        const saved = localStorage.getItem('cidr-aggregator-input');
        return saved || '';
      });
      const [copiedLink, setCopiedLink] = useState(false);
      const [copiedResults, setCopiedResults] = useState(false);

      // Save to localStorage
      useEffect(() => {
        localStorage.setItem('cidr-aggregator-input', input);
      }, [input]);

      // Load from URL on mount (URL takes precedence over localStorage)
      useEffect(() => {
        try {
          const params = new URLSearchParams(window.location.search);
          const q = params.get('q');
          if (q) {
            setInput(decodeURIComponent(q));
          }
        } catch (e) {
          console.warn('Failed to parse URL parameters:', e);
        }
      }, []);

      // Sync to URL when state changes
      useEffect(() => {
        const params = new URLSearchParams();
        if (input.trim()) {
          params.set('q', encodeURIComponent(input));
        }
        const newUrl = `${window.location.pathname}?${params.toString()}`;

        try {
          window.history.replaceState(null, '', newUrl);
        } catch (e) {
          console.debug('History update blocked.');
        }
      }, [input]);

      const copyToClipboard = async (text, setter) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
          }
          setter(true);
          setTimeout(() => setter(false), 2000);
        } catch (err) {
          console.warn("Failed to copy:", err);
        }
      };

      const copyLink = () => copyToClipboard(window.location.href, setCopiedLink);
      const copyResults = (text) => copyToClipboard(text, setCopiedResults);

      const { ranges, errors } = useMemo(() => parseCIDRs(input), [input]);
      const results = useMemo(() => aggregateCIDRs(ranges), [ranges]);

      const reduction = ranges.length > 0 ? ((1 - (results.length / ranges.length)) * 100).toFixed(1) : 0;

      const loadExample = () => {
        setInput(`192.168.1.0/24\n192.168.2.0/24\n192.168.3.0/24\n192.168.4.0/24\n192.168.0.0/24\n192.168.5.0/24\n10.0.0.5\n10.0.0.6`);
      };

      const homeHref = '../index.html';

      return (
        <div className="h-screen flex flex-col font-sans text-gray-800 bg-gray-50">
          {/* Navbar */}
          <nav className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0 z-20">
            <div className="flex items-center gap-2">
              <a href={homeHref} className="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Back to Index">
                <Icon name="Home" className="w-5 h-5" />
              </a>
              <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-sm ml-1">A</div>
              <div className="flex flex-col justify-center max-w-[200px] sm:max-w-md">
                <span className="font-bold tracking-tight text-sm leading-tight">CIDR<span className="text-blue-600">Aggregator</span></span>
                <span className="text-[10px] text-gray-500 font-medium truncate" title={pun}>{pun}</span>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <a href="subnet-calculator.html" className="text-xs font-medium text-gray-500 hover:text-blue-600 bg-transparent px-2.5 py-1.5 rounded transition-colors border border-transparent hover:border-blue-100 hover:bg-blue-50 hidden sm:block">
                &larr; Subnet Visualizer
              </a>
              <button
                onClick={copyLink}
                className="text-xs font-medium text-gray-500 bg-gray-100 hover:bg-gray-200 px-2.5 py-1.5 rounded border border-gray-200 flex items-center gap-1.5 transition-colors"
                title="Share tool state via URL"
              >
                {copiedLink ? <Icon name="Check" className="w-4 h-4 text-emerald-600" /> : <Icon name="LinkIcon" className="w-4 h-4" />}
                {copiedLink ? <span className="text-emerald-600">Copied!</span> : <span className="hidden sm:inline">Share Link</span>}
              </button>
              <a href="https://github.com/sruffilli/sruffilli.github.io" target="_blank" className="text-gray-400 hover:text-gray-900 transition-colors">
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.05-.015-2.055-3.33 0-4.035-1.44-4.29-1.875-.15-.36-.75-1.44-1.29-1.725-.435-.24-1.065-.825-.015-.84 1.14-.015 1.95 1.05 2.22 1.485 1.05 1.785 2.76 1.275 3.45.975.105-.75.405-1.275.735-1.575-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.225 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405 1.02 0 2.04.135 3 .405 2.28-1.545 3.285-1.23 3.285-1.23.66 1.695.24 2.925.12 3.225.765.84 1.23 1.92 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.42.36.78 1.095.78 2.205 0 1.59-.015 2.865-.015 3.255 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" /></svg>
              </a>
            </div>
          </nav>

          <div className="flex flex-col md:flex-row flex-1 overflow-auto md:overflow-hidden">
            {/* Sidebar Data Input */}
            <aside className="w-full md:w-80 lg:w-96 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shrink-0 z-10 shadow-sm relative">
              <div className="flex flex-col flex-1 p-5 h-[400px] md:h-auto">
                <div className="flex justify-between items-center mb-2">
                  <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1.5">
                    <Icon name="Activity" className="w-4 h-4" /> Input CIDRs
                  </label>
                  <div className="flex items-center gap-2">
                    <button onClick={loadExample} className="text-[10px] font-semibold text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors">Example</button>
                    <button onClick={() => setInput('')} className="text-[10px] font-semibold text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors flex items-center gap-1">
                      <Icon name="Trash" className="w-3 h-3" /> Clear
                    </button>
                  </div>
                </div>
                <div className="relative flex-1 flex flex-col min-h-0">
                  <textarea
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    placeholder="Enter one IP or CIDR per line, e.g.&#10;192.168.1.0/24&#10;192.168.2.0/24&#10;10.0.0.1"
                    className="w-full flex-1 resize-none bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors"
                  />
                  {/* Status Overlay */}
                  <div className="absolute bottom-3 right-3 pointer-events-none flex gap-2">
                    {ranges.length > 0 && (
                      <div className="bg-gray-800/80 backdrop-blur text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">
                        {ranges.length} Rules
                      </div>
                    )}
                  </div>
                </div>

                {errors.length > 0 && (
                  <div className="mt-3 max-h-32 overflow-y-auto border border-red-200 rounded-lg bg-red-50 p-2">
                    <div className="text-xs font-bold text-red-700 mb-1">Found Errors:</div>
                    <ul className="text-[11px] text-red-600 space-y-1 font-mono pl-3 list-disc">
                      {errors.slice(0, 5).map((err, i) => <li key={i}>{err}</li>)}
                      {errors.length > 5 && <li>... and {errors.length - 5} more</li>}
                    </ul>
                  </div>
                )}
              </div>
            </aside>

            {/* Main Content Area */}
            <main className="flex-1 bg-grid flex flex-col h-[500px] md:h-auto min-h-0">
              <div className="flex-1 overflow-hidden p-4 md:p-6 flex flex-col gap-4">

                {/* Metrics Banner */}
                <div className="bg-white border border-gray-200 rounded-xl shadow-sm p-4 flex items-center justify-between shrink-0">
                  <div className="flex items-center gap-6">
                    <div className="flex flex-col">
                      <span className="text-xs font-bold text-gray-400 uppercase">Input</span>
                      <span className="font-mono text-xl font-bold text-gray-800">{ranges.length}</span>
                    </div>
                    <Icon name="Zap" className="w-6 h-6 text-gray-300" />
                    <div className="flex flex-col">
                      <span className="text-xs font-bold text-gray-400 uppercase">Aggregated</span>
                      <span className="font-mono text-xl font-bold text-blue-600">{results.length}</span>
                    </div>
                  </div>

                  {ranges.length > 0 && reduction > 0 && (
                    <div className="hidden sm:flex bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-lg text-sm font-semibold items-center gap-1.5">
                      ↓ Reduced by {reduction}%
                    </div>
                  )}
                </div>

                {/* Results Viewer */}
                <div className="bg-white border border-gray-200 rounded-xl shadow-sm flex-1 flex flex-col min-h-0 overflow-hidden">
                  <div className="bg-gray-50 border-b border-gray-200 px-4 py-3 flex justify-between items-center shrink-0">
                    <span className="text-sm font-bold text-gray-700">Results</span>
                    <button
                      onClick={() => copyResults(results.join('\n'))}
                      disabled={results.length === 0}
                      className="px-3 py-1.5 bg-blue-600 disabled:bg-gray-300 hover:bg-blue-700 text-white font-medium rounded text-xs shadow-sm transition-all flex items-center gap-1.5"
                    >
                      {copiedResults ? <Icon name="Check" className="w-4 h-4" /> : <Icon name="Clipboard" className="w-4 h-4" />}
                      {copiedResults ? "Copied!" : "Copy All"}
                    </button>
                  </div>

                  <div className="flex-1 p-4 overflow-y-auto">
                    {results.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400 gap-3">
                        <Icon name="Activity" className="w-12 h-12 text-gray-200" />
                        <p className="text-sm font-medium">Enter subnets or IP addresses to aggregate</p>
                      </div>
                    ) : (
                      <div className="font-mono text-sm text-gray-800 flex flex-col items-start gap-0.5">
                        {results.map((cidrStr, i) => {
                          const [ip, cidr] = cidrStr.split('/');
                          return (
                            <a 
                              key={i} 
                              href={`subnet-calculator.html?ip=${ip}&cidr=${cidr || 32}`} 
                              className="hover:text-blue-600 hover:bg-blue-50 px-2 py-0.5 rounded transition-colors"
                              title="Visualize in Subnet Calculator"
                            >
                              {cidrStr}
                            </a>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>

              </div>
            </main>

          </div>
        </div>
      );
    }

    // --- Render Logic ---
    import { createRoot } from 'react-dom/client';
    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<App />);

  </script>
</body>

</html>
